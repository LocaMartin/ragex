name: Continuous Domain Processing

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day automatically
  workflow_dispatch:      # Allows you to trigger it manually from the UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # FIX 1: Grant explicit write permissions to the runner token
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Dependencies
      run: |
        go install github.com/tomnomnom/waybackurls@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Run Processing Script
      run: ./run_scan.sh

    - name: Commit and Push Progress
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # Save compressed output, not huge raw txt
        git rm --ignore-unmatch --cached waybackurls.txt || true
        git add waybackurls.txt.gz resume.cfg

        if ! git diff-index --quiet HEAD --; then
          git commit -m "Update scan progress"
          git push origin HEAD:${{ github.ref }}
        else
          echo "No progress changes to commit."
        fi
